<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <!-- Link Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css" media="screen and (min-width: 768px)">
    <!-- JS File -->
    <script defer src="scripts/temples.js"></script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <button id="hamburger" aria-label="Toggle navigation">☰</button>
        <nav id="nav-menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Temple Gallery</h2>
        <section class="gallery">
            <figure>
                <img src="images/fortaleza_brazil_temple.jpeg" alt="Temple 1">
                <figcaption>Fortaleza Brazil Temple</figcaption>
            </figure>
            <!-- Add more figures for other temples -->
            <figure>
                <img src="images/provo.jpeg" alt="Temple 2">
                <figcaption>Provo</figcaption>
            </figure>
            <figure>
                <img src="images/recife_brazil_temple.jpeg" alt="Temple 3">
                <figcaption>Recife Brazil Temple</figcaption>
            </figure>
            <figure>
                <img src="images/arequipa_peru_temple.jpeg" alt="Temple 4">
                <figcaption>Arequipa Peru Temple</figcaption>
            </figure>
            <figure>
                <img src="images/boston_massachusetts_temple.jpeg" alt="Temple 5">
                <figcaption>Boston Massachusetts Temple</figcaption>
            </figure>
            <figure>
                <img src="images/brigham_city_utah_temple.jpeg" alt="Temple 6">
                <figcaption>Brigham City Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="images/fort_lauderdale_florida_temple.jpeg" alt="Temple 7">
                <figcaption>Fort Lauderdale Florida Temple</figcaption>
            </figure>
            <figure>
                <img src="images/kansas_city_missouri_temple.jpeg" alt="Temple 8">
                <figcaption>Kansas City Missouri Temple</figcaption>
            </figure>
            <figure>
                <img src="images/oakland_california_temple.jpeg" alt="Temple 9">
                <figcaption>Oakland California Temple</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2025 🌸 Isadora Paula 🌸 Fortaleza</p>
        <p>Last Modification: <span id="last-modified"></span></p>
    </footer>
    <script src="scripts/temples.js"></script>
</body>
</html>
